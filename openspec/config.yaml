schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

rules:
  tasks:
    - Always add an initial TDD task to any implementation and guarantee it fails before writing implementation code.
    - For implementation tasks, always include a "Testing" section with test cases and expected results using de ./claude/skills/integration-test skill
    - Always include a finish task that verifies that no eslint errors are present in the modified files and that all tests pass with 'npm test'.
    - Always that create an new endpoint, add a task to update the API documentation.
